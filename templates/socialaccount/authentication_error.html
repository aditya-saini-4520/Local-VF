{% extends "base.html" %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
  <div style="background:#13131f;border:1px solid rgba(239,68,68,0.2);border-radius:16px;padding:40px;max-width:420px;width:100%;text-align:center;">
    <h2 style="color:#fca5a5;margin-bottom:8px;">⚠️ Authentication Error</h2>
    <p style="color:#64748b;margin:16px 0;font-size:15px;">Something went wrong with Google login.</p>
    
    <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:16px;margin:20px 0;">
      <p style="color:#fca5a5;font-size:13px;margin:0;">Please try again or contact support if the problem persists.</p>
    </div>
    
    <a href="/accounts/login/" style="display:inline-block;padding:12px 24px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;text-decoration:none;border-radius:10px;font-weight:600;margin:16px 0;transition:all 0.3s ease;">
      Try Again →
    </a>
    
    <p style="color:#64748b;font-size:12px;margin-top:20px;">
      <a href="/" style="color:#6366f1;text-decoration:none;">Return to Home</a>
    </p>
  </div>
</div>
{% endblock %}
